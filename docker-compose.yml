x-postgres-env: &postgres-env
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres

x-service-env: &service-env
  DB_PORT: 5432
  DB_USER: postgres
  DB_PASSWORD: postgres
  KAFKA_BROKERS: kafka:29092

x-network: &default-network
  networks:
    - microservices-net

services:
  postgres-event:
    image: postgres:17-alpine
    environment:
      <<: *postgres-env
      POSTGRES_DB: eventdb
    ports:
      - "5433:5432"
    volumes:
      - pg_event_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *default-network

  postgres-user:
    image: postgres:17-alpine
    environment:
      <<: *postgres-env
      POSTGRES_DB: userdb
    ports:
      - "5434:5432"
    volumes:
      - pg_user_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *default-network

  postgres-booking:
    image: postgres:17-alpine
    environment:
      <<: *postgres-env
      POSTGRES_DB: bookingdb
    ports:
      - "5435:5432"
    volumes:
      - pg_booking_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bookingdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *default-network

  postgres-payment:
    image: postgres:17-alpine
    environment:
      <<: *postgres-env
      POSTGRES_DB: paymentdb
    ports:
      - "5436:5432"
    volumes:
      - pg_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d paymentdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *default-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    <<: *default-network

  kafka:
    image: confluentinc/cp-kafka:8.2.0
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 5s
      retries: 5
    <<: *default-network

  event-service:
    build: ./event-service
    ports:
      - "3001:3001"
    environment:
      <<: *service-env
      PORT: 3001
      DB_HOST: postgres-event
      DB_NAME: eventdb
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres-event:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    <<: *default-network

  user-service:
    build: ./user-service
    ports:
      - "${USER_SERVICE_PORT:-3002}:3002"
    env_file:
      - ./user-service/.env
    environment:
      PORT: 3002
      KAFKA_BROKERS: kafka:29092
      BOOKING_SERVICE_URL: http://booking-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
    depends_on:
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_healthy
    <<: *default-network

  booking-service:
    build: ./booking-service
    ports:
      - "3003:3003"
    environment:
      <<: *service-env
      PORT: 3003
      DB_HOST: postgres-booking
      DB_NAME: bookingdb
      KAFKA_PAYMENTS_TOPIC: payments
      KAFKA_PAYMENTS_GROUP: booking-service
      KAFKA_SEAT_LOCK_GROUP: booking-seat-lock-processor
      REDIS_ADDR: redis:6379
      EVENT_SERVICE_URL: http://event-service:3001
      USER_SERVICE_URL: http://user-service:3002
    depends_on:
      postgres-booking:
        condition: service_healthy
      kafka:
        condition: service_healthy
      event-service:
        condition: service_started
      user-service:
        condition: service_started
    <<: *default-network

  payment-service:
    build: ./payment-service
    ports:
      - "3004:3004"
    environment:
      <<: *service-env
      PORT: 3004
      DB_HOST: postgres-payment
      DB_NAME: paymentdb
      KAFKA_RECONNECT_INTERVAL_MS: 15000
      KAFKA_PAYMENTS_TOPIC: payments
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NOTIFICATION_ROUTER_ENABLED: "true"
      NOTIFICATION_WORKERS_ENABLED: "true"
      NOTIFICATION_WORKER_CHANNELS: email,sms,push,whatsapp
      BOOKING_SERVICE_URL: http://booking-service:3003
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3004/api/payments/stripe/success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3004/api/payments/stripe/cancel}
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      booking-service:
        condition: service_started
    <<: *default-network

  nginx-gateway:
    image: nginx-gateway
    build: ./nginx
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    environment:
      NGINX_HOST: ${NGINX_HOST:-localhost}
      NGINX_PORT: ${NGINX_INTERNAL_PORT:-80}
      EVENT_SERVICE_URL: http://event-service:3001
      USER_SERVICE_URL: http://user-service:3002
      BOOKING_SERVICE_URL: http://booking-service:3003
      PAYMENT_SERVICE_URL: http://payment-service:3004
    depends_on:
      event-service:
        condition: service_started
      user-service:
        condition: service_started
      booking-service:
        condition: service_started
      payment-service:
        condition: service_started
    <<: *default-network

volumes:
  pg_event_data:
  pg_user_data:
  pg_booking_data:
  pg_payment_data:
  kafka_data:

networks:
  microservices-net:
    driver: bridge
