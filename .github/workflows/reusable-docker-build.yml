name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: false
      ACR_LOGIN_SERVER:
        required: false
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.dockerfile }}

      - name: Set up build variables
        id: vars
        run: |
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          
          GITHUB_REF="${{ github.ref }}"
          
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load image locally
        uses: docker/bake-action@v5
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ inputs.service }}
          load: true
          set: |
            ${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.service }}
            ${{ inputs.service }}.cache-to=type=gha,mode=max,scope=${{ inputs.service }}

      - name: Run Snyk to check Docker image for vulnerabilities
        continue-on-error: true 
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ steps.vars.outputs.repo }}/${{ inputs.service }}:${{ steps.vars.outputs.sha_tag }}
          args: --file=${{ inputs.dockerfile }} --sarif-file-output=snyk.sarif

      - name: Save Snyk SARIF as an Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ inputs.service }}
          path: snyk.sarif
          retention-days: 2

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        if: github.event_name != 'pull_request'
        uses: docker/bake-action@v5
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ inputs.service }}
          push: true
          set: |
            ${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.service }}

      - name: Login to Azure Container Registry
        if: github.event_name != 'pull_request' && secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push image to Azure Container Registry
        if: github.event_name != 'pull_request' && secrets.ACR_LOGIN_SERVER != '' && secrets.ACR_USERNAME != '' && secrets.ACR_PASSWORD != ''
        uses: docker/bake-action@v5
        env:
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ inputs.service }}
          push: true
          set: |
            ${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.service }}
