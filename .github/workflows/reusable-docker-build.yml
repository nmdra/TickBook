name: Reusable Docker Build

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string
    secrets:
      SNYK_TOKEN:
        required: false
      ACR_LOGIN_SERVER:
        required: false
      ACR_USERNAME:
        required: false
      ACR_PASSWORD:
        required: false
      AZURE_CLIENT_ID:
        required: false
      AZURE_CLIENT_SECRET:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false
  workflow_dispatch:
    inputs:
      service:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      context:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
      repo: ${{ steps.vars.outputs.repo }}
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ inputs.dockerfile }}

      - name: Set up build variables
        id: vars
        run: |
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          
          GITHUB_REF="${{ github.ref }}"
          
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and load image locally
        uses: docker/bake-action@v7
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ inputs.service }}
          load: true
          set: |
            ${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.service }}
            ${{ inputs.service }}.cache-to=type=gha,mode=max,scope=${{ inputs.service }}

      - name: Run Snyk to check Docker image for vulnerabilities
        continue-on-error: true 
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ steps.vars.outputs.repo }}/${{ inputs.service }}:${{ steps.vars.outputs.sha_tag }}
          args: --file=${{ inputs.dockerfile }} --sarif-file-output=snyk.sarif

      - name: Save Snyk SARIF as an Artifact
        uses: actions/upload-artifact@v7
        with:
          name: snyk-report-${{ inputs.service }}
          path: snyk.sarif
          retention-days: 2

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        if: github.event_name != 'pull_request'
        uses: docker/bake-action@v7
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ inputs.service }}
          push: true
          set: |
            ${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.service }}

      - name: Login to Azure Container Registry
        if: github.event_name != 'pull_request' && env.ACR_LOGIN_SERVER != '' && env.ACR_USERNAME != '' && env.ACR_PASSWORD != ''
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Push image to Azure Container Registry
        if: github.event_name != 'pull_request' && env.ACR_LOGIN_SERVER != '' && env.ACR_USERNAME != '' && env.ACR_PASSWORD != ''
        uses: docker/bake-action@v7
        env:
          REGISTRY: ${{ env.ACR_LOGIN_SERVER }}
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ inputs.service }}
          push: true
          set: |
            ${{ inputs.service }}.cache-from=type=gha,scope=${{ inputs.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.event_name != 'pull_request'
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - name: Azure Login
        if: env.ACR_LOGIN_SERVER != '' && env.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ env.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ env.AZURE_CLIENT_SECRET }}",
              "tenantId": "${{ env.AZURE_TENANT_ID }}",
              "subscriptionId": "${{ env.AZURE_SUBSCRIPTION_ID }}"
            }

      - name: Update Azure Container App
        if: env.ACR_LOGIN_SERVER != '' && env.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp update \
              --name ${{ inputs.service }} \
              --resource-group tickbook \
              --image ${{ env.ACR_LOGIN_SERVER }}/${{ needs.build-scan-push.outputs.repo }}/${{ inputs.service }}:${{ needs.build-scan-push.outputs.sha_tag }}

      - name: List Azure Container App Revisions
        if: env.ACR_LOGIN_SERVER != '' && env.AZURE_SUBSCRIPTION_ID != ''
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az containerapp revision list \
              --name ${{ inputs.service }} \
              --resource-group tickbook \
              --query "[].{Name:name, Image:properties.template.containers[0].image, Created:properties.createdTime}" \
              -o table
