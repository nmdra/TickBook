name: Booking Service CI

on:
  push:
    branches: [main, dev]
    tags:
      - 'v*'
    paths:
      - "booking-service/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "booking-service/**"

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/tickbook-booking-service

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: booking-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache-dependency-path: booking-service/go.sum
      - run: go vet ./...
      - run: go build -o /dev/null .

  build-and-push:
    needs: [lint-and-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: booking-service
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Run Snyk to check Docker image for vulnerabilities
        uses: snyk/actions/docker@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ env.DOCKER_IMAGE }}:${{ steps.meta.outputs.version }}
          args: --severity-threshold=critical
      - name: Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: payment-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
