name: Booking Service CI

on:
  push:
    branches: [main]
    paths:
      - "booking-service/**"
  pull_request:
    branches: [main]
    paths:
      - "booking-service/**"

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/tickbook-booking-service

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: booking-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: booking-service/go.sum
      - run: go vet ./...
      - run: go build -o /dev/null .

  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: booking-service
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
