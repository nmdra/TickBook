name: Docker Build, Scan, and Push (Manual)

on:
  workflow_dispatch:

permissions: {}

jobs:
  detect-changes:
    name: Select Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
    steps:
      - name: Set services list
        id: set-services
        run: |
          echo 'services=["event-service","user-service","booking-service","payment-service","nginx-gateway"]' >> $GITHUB_OUTPUT

  build-scan-push:
    name: Build & Scan - ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve service paths
        id: service-paths
        run: |
          declare -A dockerfiles=(
            [event-service]=event-service/Dockerfile
            [user-service]=user-service/Dockerfile
            [booking-service]=booking-service/Dockerfile
            [payment-service]=payment-service/Dockerfile
            [nginx-gateway]=nginx/Dockerfile
          )
          dockerfile=${dockerfiles["${{ matrix.service }}"]}
          if [[ -z "$dockerfile" ]]; then
            echo "Unknown service: ${{ matrix.service }}" >&2
            exit 1
          fi
          echo "dockerfile=$dockerfile" >> $GITHUB_OUTPUT

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ steps.service-paths.outputs.dockerfile }}

      - name: Set up build variables
        id: vars
        run: |
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          
          echo "tag=manual-${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load image locally
        uses: docker/bake-action@v5
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ matrix.service }}
          load: true
          set: |
            ${{ matrix.service }}.cache-from=type=gha,scope=${{ matrix.service }}
            ${{ matrix.service }}.cache-to=type=gha,mode=max,scope=${{ matrix.service }}

      - name: Run Snyk to check Docker image for vulnerabilities
        continue-on-error: true 
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ steps.vars.outputs.repo }}/${{ matrix.service }}:${{ steps.vars.outputs.sha_tag }}
          args: --file=${{ steps.service-paths.outputs.dockerfile }} --sarif-file-output=snyk.sarif

      - name: Save Snyk SARIF as an Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ matrix.service }}
          path: snyk.sarif
          retention-days: 2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        uses: docker/bake-action@v5
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ matrix.service }}
          push: true
          set: |
            ${{ matrix.service }}.cache-from=type=gha,scope=${{ matrix.service }}

      - name: Login to Azure Container Registry
        if: env.ACR_LOGIN_SERVER != '' && env.ACR_USERNAME != '' && env.ACR_PASSWORD != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}

      - name: Push image to Azure Container Registry
        if: env.ACR_LOGIN_SERVER != '' && env.ACR_USERNAME != '' && env.ACR_PASSWORD != ''
        uses: docker/bake-action@v5
        env:
          REGISTRY: ${{ env.ACR_LOGIN_SERVER }}
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ matrix.service }}
          push: true
          set: |
            ${{ matrix.service }}.cache-from=type=gha,scope=${{ matrix.service }}
