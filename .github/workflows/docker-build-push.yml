name: Docker Build, Scan, and Push

on:
  push:
    branches:
      - main
      - Development
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            event-service:
              - 'event-service/**'
            user-service:
              - 'user-service/**'
            booking-service:
              - 'booking-service/**'
            payment-service:
              - 'payment-service/**'

  build-scan-push:
    name: Build & Scan - ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.service }}/Dockerfile

      - name: Set up build variables
        id: vars
        run: |
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${github.ref#refs/tags/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            echo "tag=pr-${{ github.event.number }}" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load image locally
        uses: docker/bake-action@v5
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ matrix.service }}
          load: true
          set: |
            ${{ matrix.service }}.cache-from=type=gha,scope=${{ matrix.service }}
            ${{ matrix.service }}.cache-to=type=gha,mode=max,scope=${{ matrix.service }}

      - name: Run Snyk to check Docker image for vulnerabilities
        continue-on-error: true 
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ steps.vars.outputs.repo }}/${{ matrix.service }}:${{ steps.vars.outputs.sha_tag }}
          args: --file=${{ matrix.service }}/Dockerfile --sarif-file-output=snyk.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
          category: snyk-${{ matrix.service }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to registry
        if: github.event_name != 'pull_request'
        uses: docker/bake-action@v5
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ matrix.service }}
          push: true
          set: |
            ${{ matrix.service }}.cache-from=type=gha,scope=${{ matrix.service }}