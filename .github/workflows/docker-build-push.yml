name: Docker Build and Push

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
      repo: ${{ steps.vars.outputs.repo }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build variables
        id: vars
        run: |
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with Docker Bake
        uses: docker/bake-action@v5
        env:
          REGISTRY: ghcr.io
          REPO: ${{ steps.vars.outputs.repo }}
          TAG: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'latest' }}
          SHA_TAG: ${{ github.event_name != 'pull_request' && steps.vars.outputs.sha_tag || '' }}
        with:
          files: ./docker-bake.hcl
          push: ${{ github.event_name != 'pull_request' }}

  snyk-scan:
    name: Snyk Container Scan - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        service: [event-service, user-service, booking-service, payment-service]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ needs.build-and-push.outputs.repo }}/${{ matrix.service }}:${{ needs.build-and-push.outputs.sha_tag }}

      - name: Run Snyk container scan
        uses: snyk/actions/docker@v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ghcr.io/${{ needs.build-and-push.outputs.repo }}/${{ matrix.service }}:${{ needs.build-and-push.outputs.sha_tag }}
          args: --file=${{ matrix.service }}/Dockerfile --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif
          category: snyk-${{ matrix.service }}
