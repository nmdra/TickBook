name: ACR Build, Scan, and Push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: read

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.changes }}
    steps:
      - name: Check ACR secrets
        id: acr
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}
        run: |
          if [[ -n "$ACR_LOGIN_SERVER" && -n "$ACR_USERNAME" && -n "$ACR_PASSWORD" && -n "$ACR_REPOSITORY" ]]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Set services output
        id: set-services
        run: |
          if [[ "${{ steps.acr.outputs.enabled }}" == "true" ]]; then
            echo 'changes=["event-service","user-service","booking-service","payment-service"]' >> $GITHUB_OUTPUT
          else
            echo "changes=[]" >> $GITHUB_OUTPUT
          fi

  build-scan-push:
    name: Copy to ACR - ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Set up tag variables
        id: vars
        run: |
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          echo "repo=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Copy image tags to Azure Container Registry
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_REPOSITORY: ${{ secrets.ACR_REPOSITORY }}
          GHCR_REPO: ${{ steps.vars.outputs.repo }}
          SERVICE: ${{ matrix.service }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        run: |
          docker buildx imagetools create \
            --tag "${ACR_LOGIN_SERVER}/${ACR_REPOSITORY}/${SERVICE}:${TAG}" \
            "ghcr.io/${GHCR_REPO}/${SERVICE}:${TAG}"
          docker buildx imagetools create \
            --tag "${ACR_LOGIN_SERVER}/${ACR_REPOSITORY}/${SERVICE}:${SHA_TAG}" \
            "ghcr.io/${GHCR_REPO}/${SERVICE}:${SHA_TAG}"
