name: ACR Build, Scan, and Push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.changes }}
    steps:
      - name: Check ACR secrets
        id: acr
        run: |
          if [[ -n "${{ secrets.ACR_LOGIN_SERVER }}" && -n "${{ secrets.ACR_USERNAME }}" && -n "${{ secrets.ACR_PASSWORD }}" && -n "${{ secrets.ACR_REPOSITORY }}" ]]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.acr.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Filter changed paths
        if: steps.acr.outputs.enabled == 'true'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            event-service:
              - 'event-service/**'
            user-service:
              - 'user-service/**'
            booking-service:
              - 'booking-service/**'
            payment-service:
              - 'payment-service/**'

      - name: Set services output
        id: set-services
        run: |
          if [[ "${{ steps.acr.outputs.enabled }}" == "true" ]]; then
            echo "changes=${{ steps.filter.outputs.changes }}" >> $GITHUB_OUTPUT
          else
            echo "changes=[]" >> $GITHUB_OUTPUT
          fi

  build-scan-push:
    name: Build & Scan - ${{ matrix.service }}
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile with Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.service }}/Dockerfile

      - name: Set up build variables
        id: vars
        run: |
          echo "sha_tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load image locally
        uses: docker/bake-action@v5
        env:
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          REPO: ${{ secrets.ACR_REPOSITORY }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ matrix.service }}
          load: true
          set: |
            ${{ matrix.service }}.cache-from=type=gha,scope=${{ matrix.service }}
            ${{ matrix.service }}.cache-to=type=gha,mode=max,scope=${{ matrix.service }}

      - name: Run Snyk to check Docker image for vulnerabilities
        continue-on-error: true
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.ACR_REPOSITORY }}/${{ matrix.service }}:${{ steps.vars.outputs.sha_tag }}
          args: --file=${{ matrix.service }}/Dockerfile --sarif-file-output=snyk.sarif

      - name: Save Snyk SARIF as an Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-report-${{ matrix.service }}
          path: snyk.sarif
          retention-days: 2

      - name: Login to Azure Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Push image to Azure Container Registry
        uses: docker/bake-action@v5
        env:
          REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
          REPO: ${{ secrets.ACR_REPOSITORY }}
          TAG: ${{ steps.vars.outputs.tag }}
          SHA_TAG: ${{ steps.vars.outputs.sha_tag }}
        with:
          files: ./docker-bake.hcl
          targets: ${{ matrix.service }}
          push: true
          set: |
            ${{ matrix.service }}.cache-from=type=gha,scope=${{ matrix.service }}
