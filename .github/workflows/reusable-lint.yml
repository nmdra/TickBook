name: Reusable Lint

on:
  workflow_call:
    inputs:
      service_type:
        required: true
        type: string # 'node' or 'go'
      working_directory:
        required: true
        type: string

jobs:
  lint-node:
    if: inputs.service_type == 'node'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working_directory }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ inputs.working_directory }}

      - name: Run Lint (Standard JS/TS)
        # Using npx to run eslint even if not in package.json, 
        # but we might need a basic config or use a generic linter
        run: |
          if [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f eslint.config.js ]; then
            npx eslint .
          else
            echo "No ESLint config found. Running a basic check with npx eslint --no-eslintrc --env es2021,node ."
            npx eslint --no-eslintrc --env es2021,node --parser-options "{ecmaVersion: latest}" . || true
          fi
        working-directory: ${{ inputs.working_directory }}

  lint-go:
    if: inputs.service_type == 'go'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: ${{ inputs.working_directory }}/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v.2.11
          working-directory: ${{ inputs.working_directory }}
          args: --timeout=5m
